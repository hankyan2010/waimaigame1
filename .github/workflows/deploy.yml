name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          # 先清空目标目录
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "rm -rf /usr/share/nginx/html/game/* && mkdir -p /usr/share/nginx/html/game"
          # 用 scp 上传
          sshpass -e scp -o StrictHostKeyChecking=no -r \
            out/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/usr/share/nginx/html/game/

      - name: Verify and reload
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '=== Files ===' && ls /usr/share/nginx/html/game/ && echo '=== Reload ===' && nginx -s reload || systemctl reload nginx || true && echo 'Deploy OK'"
