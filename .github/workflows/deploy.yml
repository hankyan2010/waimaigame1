name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Check secrets availability
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then echo "::error::SERVER_HOST secret is empty!"; fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then echo "::error::SERVER_USER secret is empty!"; fi
          if [ -z "${{ secrets.SERVER_PASSWORD }}" ]; then echo "::error::SERVER_PASSWORD secret is empty!"; fi
          echo "Host length: ${#HOST_VAL}"
          echo "User length: ${#USER_VAL}"
          echo "Pass length: ${#PASS_VAL}"
        env:
          HOST_VAL: ${{ secrets.SERVER_HOST }}
          USER_VAL: ${{ secrets.SERVER_USER }}
          PASS_VAL: ${{ secrets.SERVER_PASSWORD }}

      - name: Deploy via rsync over sshpass
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            out/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/usr/share/nginx/html/game/

      - name: Verify deployment
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /usr/share/nginx/html/game/ && nginx -s reload || systemctl reload nginx || true && echo 'Deploy OK'"
