name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 121.36.105.43
          username: root
          password: HankyHh441402@@
          source: "out/*"
          target: "/usr/share/nginx/html/game/"
          strip_components: 1
          rm: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: 121.36.105.43
          username: root
          password: HankyHh441402@@
          script: |
            echo "=== Deployed files ==="
            ls -la /usr/share/nginx/html/game/
            echo "=== Nginx config check ==="
            nginx -t
            echo "=== Reload nginx ==="
            nginx -s reload || systemctl reload nginx || true
            echo "=== Done ==="
