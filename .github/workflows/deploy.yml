name: Deploy Game1 to /var/www/html/oldgame/

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TARGET_DIR: /var/www/html/oldgame
  NEXT_PUBLIC_BASE_PATH: /oldgame

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build with basePath=/oldgame
        env:
          NEXT_PUBLIC_BASE_PATH: /oldgame
        run: npm run build

      - name: Verify build output uses /oldgame
        run: |
          test -f out/index.html
          if grep -q '"/game/_next' out/index.html; then
            echo "ERROR: build still references /game/, basePath not applied" && exit 1
          fi
          echo "Build looks good (uses /oldgame paths)"

      - name: Backup current oldgame on server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD || 'HankyHh441402@@' }}
        run: |
          sudo apt-get install -y sshpass
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER || 'root' }}@${{ secrets.SERVER_HOST || '121.36.105.43' }} \
            "cd /var/www/html && tar czf /tmp/oldgame-backup-\$(date +%Y%m%d-%H%M%S).tgz oldgame 2>/dev/null && ls -lt /tmp/oldgame-backup-*.tgz | head -3"

      - name: Deploy to /var/www/html/oldgame/
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD || 'HankyHh441402@@' }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER || 'root' }}@${{ secrets.SERVER_HOST || '121.36.105.43' }} \
            "rm -rf /var/www/html/oldgame/* /var/www/html/oldgame/.[!.]* 2>/dev/null; mkdir -p /var/www/html/oldgame"
          sshpass -e scp -o StrictHostKeyChecking=no -r out/* \
            ${{ secrets.SERVER_USER || 'root' }}@${{ secrets.SERVER_HOST || '121.36.105.43' }}:/var/www/html/oldgame/
          echo "Deployed to /var/www/html/oldgame/"

      - name: Smoke test
        run: |
          sleep 2
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://waimaiketang.com/oldgame/)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: smoke test failed, got HTTP $STATUS" && exit 1
          fi
          echo "Smoke test OK"

      # ⚠️ 重要说明（2026-04-09 重写）：
      # 之前的 deploy.yml 把 Game1 部署到了 /usr/share/nginx/html/game 和 /var/www/html/game
      # 等多个目录，其中 /var/www/html/game 是 QuizGame 的目录，导致 Game1 每次 push 都会
      # 偷偷覆盖 QuizGame，而 Game1 自己反而不会更新到 oldgame 目录。
      #
      # 现在的 deploy.yml 只部署到 /var/www/html/oldgame/，且 build 时强制 basePath=/oldgame，
      # 不再触碰 game 目录、不再 reload nginx（线上是 Apache）、构建后会校验路径前缀。
