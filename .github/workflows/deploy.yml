name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: List build output
        run: |
          echo "=== Build output ==="
          ls -la out/
          echo "=== Check version ==="
          grep -o 'v[0-9]\.[0-9]\.[0-9][a-z\-]*' out/index.html || echo "no version found in html"

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "out/*"
          target: "/usr/share/nginx/html/game/"
          strip_components: 1
          rm: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== Deployed files ==="
            ls -la /usr/share/nginx/html/game/
            echo "=== Check index.html ==="
            head -5 /usr/share/nginx/html/game/index.html
            echo "=== Nginx config ==="
            nginx -t 2>&1
            nginx -s reload || systemctl reload nginx || true
            echo "=== Done ==="
